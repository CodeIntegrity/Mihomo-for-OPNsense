# 此文件由 base.yaml + override.yaml + profiles/<active>.yaml 合并生成。
# 请编辑 base.yaml / override.yaml / profiles/ 下的源文件，不要直接改这里。
# UI 上保存时会重新生成此文件。

port: 7890
socks-port: 7891
mode: rule
allow-lan: true
log-level: warning
ipv6: false
unified-delay: true
tcp-concurrent: true
find-process-mode: 'off'

external-controller: '0.0.0.0:9090'
external-ui: /usr/local/etc/mihomo/ui
secret: ''

tun:
  enable: true
  stack: gvisor
  device: tun_3000
  mtu: 9000
  auto-route: true
  strict-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 127.0.0.1:5355
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - '80'
        - '8080-8880'
      override-destination: true
    TLS:
      ports:
        - '443'
        - '8443'
    QUIC:
      ports:
        - '443'
        - '8443'
  skip-domain:
    - '+.push.apple.com'

proxies:
  - name: vless
    type: vless
    server: 88.88.88.88
    port: 1443
    uuid: aa5aa394-378c-4710-92e8-a441acdee9b9
    network: tcp
    udp: true
    tls: true
    flow: xtls-rprx-vision
    servername: apple.com
    reality-opts:
      public-key: q4vXvVtKwT67g4tYa7twV5dFZY_ApCTBaSJTGXZpXD4
      short-id: 89f095df
    client-fingerprint: chrome

  - name: vmess
    type: vmess
    server: 88.88.88.88
    port: 2443
    uuid: aa5aa394-378c-4710-92e8-a441acdee9b9
    alterId: 0
    cipher: auto
    udp: true
    tls: false
    network: ws
    servername: www.bing.com
    ws-opts:
      path: aa5aa394-378c-4710-92e8-a441acdee9b9-vm
      headers:
        Host: www.bing.com

  - name: hy2
    type: hysteria2
    server: 88.88.88.88
    port: 3443
    password: aa5aa394-378c-4710-92e8-a441acdee9b9
    alpn:
      - h3
    sni: www.bing.com
    skip-cert-verify: true
    fast-open: true

  - name: tuic5
    type: tuic
    server: 88.88.88.88
    port: 4443
    uuid: aa5aa394-378c-4710-92e8-a441acdee9b9
    password: aa5aa394-378c-4710-92e8-a441acdee9b9
    alpn:
      - h3
    disable-sni: true
    reduce-rtt: true
    udp-relay-mode: native
    congestion-controller: bbr
    sni: www.bing.com
    skip-cert-verify: true

  - name: anytls
    type: anytls
    server: 88.88.88.88
    port: 5443
    password: aa5aa394-378c-4710-92e8-a441acdee9b9
    client-fingerprint: chrome
    udp: true
    idle-session-check-interval: 30
    idle-session-timeout: 30
    sni: www.bing.com
    skip-cert-verify: true

proxy-groups:
  - name: 负载均衡
    type: load-balance
    url: https://www.gstatic.com/generate_204
    interval: 300
    strategy: round-robin
    proxies:
      - vless
      - vmess
      - hy2
      - tuic5
      - anytls

  - name: 自动选择
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      - vless
      - vmess
      - hy2
      - tuic5
      - anytls

  - name: 🌍选择代理节点
    type: select
    proxies:
      - 负载均衡
      - 自动选择
      - DIRECT
      - vless
      - vmess
      - hy2
      - tuic5
      - anytls

rules:
  - GEOIP,LAN,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,🌍选择代理节点
