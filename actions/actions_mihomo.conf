[start]
command:sh /usr/local/etc/rc.d/mihomo start
parameters:
type:script
message:starting mihomo

[stop]
command:sh /usr/local/etc/rc.d/mihomo stop
parameters:
type:script
message:stopping mihomo

[restart]
command:sh /usr/local/etc/rc.d/mihomo restart
parameters:
type:script
message:restarting mihomo
description:Restart mihomo service

[status]
command:sh /usr/local/etc/rc.d/mihomo status;exit 0
parameters:
type:script_output
message:request mihomo status

[sub-update]
command:/usr/local/etc/mihomo/sub/sub_cron.sh
parameters:
type:script_output
description:Mihomo subscription auto-update

[update-geoip]
command:/usr/local/etc/mihomo/sub/update_geoip.sh %s
parameters:%s
type:script_output
description:Mihomo GeoIP database update

[update-ui]
command:/usr/local/etc/mihomo/sub/update_ui.sh %s %s
parameters:%s %s
type:script_output
description:Mihomo Dashboard UI update

[update-core]
command:/usr/local/etc/mihomo/sub/update_core.sh %s
parameters:%s
type:script_output
description:Mihomo core binary update
