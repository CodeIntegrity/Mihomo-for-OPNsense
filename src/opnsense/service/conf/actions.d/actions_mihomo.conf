[start]
command:/usr/local/etc/rc.d/mihomo onestart
parameters:
type:script
message:starting mihomo
description:Start mihomo service

[stop]
command:/usr/local/etc/rc.d/mihomo onestop
parameters:
type:script
message:stopping mihomo
description:Stop mihomo service

[restart]
command:/usr/local/etc/rc.d/mihomo onerestart
parameters:
type:script
message:restarting mihomo
description:Restart mihomo service

[status]
command:/usr/local/etc/rc.d/mihomo status;exit 0
parameters:
type:script_output
message:request mihomo status
description:Show mihomo service status

[reconfigure]
command:/usr/local/opnsense/scripts/mihomo/reconfigure.py
parameters:
type:script_output
message:rebuilding mihomo configuration
description:Render base.yaml from config.xml, merge with override + active profile, validate and reload

[sub-update]
command:/usr/local/opnsense/scripts/mihomo/sub_cron.sh
parameters:
type:script_output
description:Mihomo subscription auto-update (cron entry)

[sub-refresh]
command:/usr/sbin/daemon -f /usr/local/opnsense/scripts/mihomo/sub.sh %s
parameters:[0-9a-f-]{36}
type:script_output
description:Refresh a single subscription by OPNsense UUID (runs in background)

[update-core]
command:/usr/sbin/daemon -f /usr/local/opnsense/scripts/mihomo/update_core.sh
parameters:
type:script_output
description:Update mihomo core binary (runs in background)

[update-geoip]
command:/usr/sbin/daemon -f /usr/local/opnsense/scripts/mihomo/update_geoip.sh
parameters:
type:script_output
description:Update GeoIP database (runs in background)

[update-ui]
command:/usr/sbin/daemon -f /usr/local/opnsense/scripts/mihomo/update_ui.sh %s
parameters:(zashboard|metacubexd|yacd)
type:script_output
description:Update Dashboard UI variant (runs in background)

[health-check]
command:/usr/sbin/daemon -f /usr/local/opnsense/scripts/mihomo/mihomo_health_check.sh %s %s %s
parameters:[a-f0-9]{16,64},[a-zA-Z0-9_-]{1,64},(quick|full)
type:script_output
description:Run health check (args: uuid profile_name mode; runs in background)
